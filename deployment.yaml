apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  labels:
    app: ecommerce-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ecommerce-app

  template:
    metadata:
      labels:
        app: ecommerce-app

    spec:
      containers:
      - name: ecommerce-container
        image: haripriyakamaraj2410/ecommerce-app:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-service

spec:
  type: NodePort

  selector:
    app: ecommerce-app

  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30007
