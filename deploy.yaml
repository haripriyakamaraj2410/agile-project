apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ecommerce-app

  template:
    metadata:
      labels:
        app: ecommerce-app

    spec:
      containers:
      - name: ecommerce-container
        image: sarumathikm/ecommerce-app:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-service

spec:
  type: NodePort

  selector:
    app: ecommerce-app

  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30007